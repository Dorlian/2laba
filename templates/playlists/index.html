{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="hero">
  <div class="hero__text">
    <h1 class="hero__title">{{ t.hero_title }}</h1>
    <p class="hero__lead">{{ t.hero_text }}</p>
    <a class="btn btn--primary" href="{% url 'playlists:create' %}">{{ t.nav_create }}</a>
  </div>
  <div class="hero__art">
    <a class="hero__art-link" href="{% url 'playlists:catalog' %}" aria-label="{{ t.hero_art_aria }}">
      <img src="{% static 'images/playlist-hero.svg' %}" width="320" height="240" alt="" role="presentation">
    </a>
  </div>
</section>
{% endblock %}
